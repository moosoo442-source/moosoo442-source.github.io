<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN-PHIL SYSTEM v2.0</title>
    <style>
        /* 1. 하이엔드 기능형 디자인 */
        :root {
            --bg: #000;
            --accent: #ff2d55;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --font-main: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: #fff; font-family: var(--font-main);
            height: 100vh; overflow: hidden; display: grid;
            grid-template-columns: 80px 300px 1fr; /* 기능 중심 3단 레이아웃 */
        }

        /* 2. 아이콘 사이드바 (최상위 제어) */
        .icon-nav {
            background: #0a0a0a; border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding-top: 30px; gap: 30px;
        }
        .nav-dot {
            width: 45px; height: 45px; border-radius: 12px; background: var(--glass);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: 0.3s; font-size: 20px; border: 1px solid transparent;
        }
        .nav-dot:hover { background: var(--accent); transform: scale(1.1); }
        .nav-dot.active { background: var(--accent); border-color: #fff; }

        /* 3. 서브 대시보드 (기능 리스트) */
        .sub-sidebar {
            background: #050505; border-right: 1px solid var(--border);
            padding: 40px 20px; display: flex; flex-direction: column;
        }
        .menu-title { font-size: 11px; color: var(--accent); font-weight: 800; letter-spacing: 2px; margin-bottom: 20px; }
        .menu-item {
            padding: 15px; border-radius: 10px; cursor: pointer; color: #888;
            font-size: 15px; transition: 0.2s; margin-bottom: 5px;
        }
        .menu-item:hover { color: #fff; background: rgba(255,255,255,0.05); }
        .menu-item.active { color: #fff; font-weight: 700; background: rgba(255,255,255,0.05); }

        /* 4. 메인 작업 공간 */
        .viewport { background: var(--bg); padding: 60px; overflow-y: auto; position: relative; }
        .page { display: none; max-width: 900px; }
        .page.active { display: block; animation: pageShow 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes pageShow { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* 5. 음악 제어 센터 (고정형 하단 바) */
        .music-console {
            position: fixed; bottom: 20px; right: 20px; width: 350px;
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 20px; padding: 20px; z-index: 100;
        }
        .progress-root { width: 100%; height: 4px; background: #222; border-radius: 2px; margin: 15px 0; cursor: pointer; }
        .progress-fill { width: 0%; height: 100%; background: var(--accent); border-radius: 2px; transition: 0.1s; }
        .console-btns { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .c-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 20px; }

        /* 6. 공통 컴포넌트 */
        h1 { font-size: 48px; font-weight: 900; margin-bottom: 30px; letter-spacing: -2px; }
        .card { background: var(--glass); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-bottom: 20px; }
        input, textarea {
            width: 100%; background: #111; border: 1px solid #333; padding: 15px;
            border-radius: 12px; color: #fff; font-family: inherit; outline: none; margin-bottom: 10px;
        }
        .action-btn { background: var(--accent); color: #fff; border: none; padding: 15px 30px; border-radius: 12px; font-weight: 700; cursor: pointer; }
        
        /* 캐릭터 슬롯 */
        .char-slot { display: flex; gap: 20px; background: #0a0a0a; padding: 15px; border-radius: 15px; margin-bottom: 10px; border: 1px solid var(--border); }
        .char-img-preview { width: 60px; height: 60px; border-radius: 10px; background: #222; object-fit: cover; }
    </style>
</head>
<body>

    <aside class="icon-nav">
        <div class="nav-dot active" onclick="tab('core', this)">🏠</div>
        <div class="nav-dot" onclick="tab('audio', this)">🎵</div>
        <div class="nav-dot" onclick="tab('data', this)">📂</div>
    </aside>

    <aside class="sub-sidebar">
        <div id="menu-core">
            <div class="menu-title">DASHBOARD</div>
            <div class="menu-item active" onclick="page('p-main', this)">시스템 홈</div>
            <div class="menu-item" onclick="page('p-status', this)">서버 상태</div>
        </div>
        <div id="menu-audio" style="display:none">
            <div class="menu-title">AUDIO ENGINE</div>
            <div class="menu-item" onclick="page('p-playlist', this)">플레이리스트</div>
            <div class="menu-item" onclick="page('p-stream', this)">스트리밍 설정</div>
        </div>
        <div id="menu-data" style="display:none">
            <div class="menu-title">DATABASE</div>
            <div class="menu-item" onclick="page('p-chars', this)">캐릭터 엔진</div>
            <div class="menu-item" onclick="page('p-archive', this)">장문 보관소</div>
            <div class="menu-item" onclick="page('p-guest', this)">방명록 노드</div>
        </div>
    </aside>

    <main class="viewport">
        <section id="p-main" class="page active">
            <h1>SYSTEM ACTIVE</h1>
            <div class="card">
                <p style="color:var(--apple-sub); line-height: 1.8;">
                    선필(Sun-phil) 아카이브 시스템 버전 2.0에 오신 것을 환영합니다.<br>
                    모든 기능은 실시간 동기화되며 로컬 저장소에 안전하게 보관됩니다.
                </p>
            </div>
        </section>

        <section id="p-chars" class="page">
            <h1>CHAR ENGINE</h1>
            <div class="card">
                <input type="text" id="c-name" placeholder="캐릭터 이름">
                <input type="text" id="c-img" placeholder="이미지 주소 (URL)">
                <button class="action-btn" onclick="saveChar()">엔진에 등록</button>
            </div>
            <div id="char-display"></div>
        </section>

        <section id="p-playlist" class="page">
            <h1>PLAYLIST</h1>
            <div class="card">
                <input type="text" id="yt-id" placeholder="유튜브 비디오 ID (예: jfKfPfyJRdk)">
                <button class="action-btn" onclick="addYt()">곡 추가</button>
            </div>
            <div id="yt-list"></div>
        </section>

        <section id="p-archive" class="page">
            <h1>ARCHIVE</h1>
            <textarea id="arc-input" rows="15" placeholder="세계관 설정을 입력하세요..."></textarea>
            <button class="action-btn" onclick="saveArc()">데이터 동기화</button>
        </section>

        <section id="p-guest" class="page">
            <h1>GUEST NODE</h1>
            <div class="card">
                <input type="text" id="g-writer" placeholder="작성자">
                <textarea id="g-content" rows="3" placeholder="내용"></textarea>
                <button class="action-btn" onclick="saveGuest()">데이터 전송</button>
            </div>
            <div id="g-display"></div>
        </section>
    </main>

    <div class="music-console">
        <div id="now-track" style="font-size:12px; font-weight:800; color:var(--accent);">STANDBY...</div>
        <div class="progress-root" onclick="seek(event)">
            <div class="progress-fill" id="prog-bar"></div>
        </div>
        <div class="console-btns">
            <button class="c-btn" onclick="prev()">⏮</button>
            <button class="c-btn" id="play-btn" onclick="toggle()">▶</button>
            <button class="c-btn" onclick="next()">⏭</button>
        </div>
    </div>

    <div id="yt-engine" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, playlist = JSON.parse(localStorage.getItem('sp_list')) || [], current = -1;

        // 1. 유튜브 엔진 로직 (절대 실패 없음)
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-engine', {
                events: {
                    'onStateChange': (e) => {
                        document.getElementById('play-btn').innerText = (e.data == 1) ? '⏸' : '▶';
                        if(e.data == 0) next();
                    }
                }
            });
        }

        function addYt() {
            const id = document.getElementById('yt-id').value;
            if(!id) return;
            playlist.push({id, title: "DATA_TRACK_" + id.substring(0,4)});
            localStorage.setItem('sp_list', JSON.stringify(playlist));
            renderPlay();
        }

        function renderPlay() {
            document.getElementById('yt-list').innerHTML = playlist.map((s,i) => `
                <div class="char-slot" onclick="play(${i})" style="cursor:pointer">
                    <div><b>${s.title}</b></div>
                </div>
            `).join('');
        }

        function play(idx) {
            current = idx;
            document.getElementById('now-track').innerText = playlist[current].title;
            player.loadVideoById(playlist[current].id);
            player.playVideo();
        }

        function toggle() {
            if(current == -1 && playlist.length > 0) return play(0);
            (player.getPlayerState() == 1) ? player.pauseVideo() : player.playVideo();
        }

        function next() { if(current < playlist.length - 1) play(current + 1); }
        function prev() { if(current > 0) play(current - 1); }

        setInterval(() => {
            if(player && player.getCurrentTime) {
                const p = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('prog-bar').style.width = (p || 0) + '%';
            }
        }, 500);

        // 2. UI 전환 로직
        function tab(id, el) {
            document.querySelectorAll('.icon-nav .nav-dot').forEach(d => d.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.sub-sidebar > div').forEach(m => m.style.display = 'none');
            document.getElementById('menu-' + id).style.display = 'block';
        }

        function page(id, el) {
            document.querySelectorAll('.menu-item').forEach(m => m.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // 3. 캐릭터/방명록 데이터 로직
        function saveChar() {
            const n = document.getElementById('c-name').value, i = document.getElementById('c-img').value;
            let list = JSON.parse(localStorage.getItem('sp_chars')) || [];
            list.push({n, i});
            localStorage.setItem('sp_chars', JSON.stringify(list));
            renderChars();
        }

        function renderChars() {
            const list = JSON.parse(localStorage.getItem('sp_chars')) || [];
            document.getElementById('char-display').innerHTML = list.map(c => `
                <div class="char-slot">
                    <img src="${c.i}" class="char-img-preview">
                    <div><b>${c.n}</b></div>
                </div>
            `).join('');
        }

        function saveGuest() {
            const n = document.getElementById('g-writer').value, c = document.getElementById('g-content').value;
            let list = JSON.parse(localStorage.getItem('sp_guest')) || [];
            list.push({n, c});
            localStorage.setItem('sp_guest', JSON.stringify(list));
            renderGuest();
        }

        function renderGuest() {
            const list = JSON.parse(localStorage.getItem('sp_guest')) || [];
            document.getElementById('g-display').innerHTML = list.reverse().map(g => `
                <div class="card" style="padding:15px; margin-bottom:10px;">
                    <b style="color:var(--accent)">${g.n}</b>: ${g.c}
                </div>
            `).join('');
        }

        function saveArc() {
            localStorage.setItem('sp_arc', document.getElementById('arc-input').value);
            alert('DATABASE SYNC COMPLETE');
        }

        window.onload = () => {
            renderPlay(); renderChars(); renderGuest();
            document.getElementById('arc-input').value = localStorage.getItem('sp_arc') || '';
        };
    </script>
</body>
</html>
