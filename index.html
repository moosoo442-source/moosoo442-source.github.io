<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN-PHIL ARCHIVE</title>
    <style>
        :root {
            --apple-bg: #000000;
            --apple-card: rgba(28, 28, 30, 0.6);
            --apple-accent: #ff2d55;
            --apple-text: #ffffff;
            --apple-sub: #86868b;
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body {
            background: var(--apple-bg); color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            height: 100vh; overflow: hidden; display: flex;
        }

        /* [사이드바] 애플 뮤직 스타일 */
        .sidebar {
            width: 320px; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(50px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; padding: 40px 25px;
        }

        .nav-item {
            padding: 12px 15px; border-radius: 10px; cursor: pointer;
            font-size: 16px; font-weight: 500; margin-bottom: 5px; color: var(--apple-sub);
        }
        .nav-item:hover { color: #fff; background: rgba(255, 255, 255, 0.05); }
        .nav-item.active { color: #fff; background: var(--apple-accent); font-weight: 600; }

        /* [메인 뷰포트] */
        .viewport { flex: 1; padding: 60px; overflow-y: auto; position: relative; }
        .page { display: none; }
        .page.active { display: block; animation: appleFade 0.6s ease-out; }
        @keyframes appleFade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }

        /* [음악 플레이어 위젯] */
        .music-widget {
            margin-top: auto; background: var(--apple-card); border-radius: 20px;
            padding: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .now-playing { font-size: 13px; font-weight: 700; color: var(--apple-accent); margin-bottom: 10px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .progress-container { width: 100%; height: 4px; background: #333; border-radius: 2px; margin: 15px 0; cursor: pointer; }
        .progress-bar { width: 0%; height: 100%; background: #fff; border-radius: 2px; transition: width 0.1s linear; }
        
        .controls { display: flex; justify-content: space-around; align-items: center; }
        .btn-play { background: #fff; color: #000; border: none; width: 40px; height: 40px; border-radius: 50%; font-size: 20px; cursor: pointer; }

        /* [기능성 UI] */
        .input-apple {
            width: 100%; background: #1c1c1e; border: none; padding: 15px;
            border-radius: 12px; color: #fff; margin-bottom: 15px; font-size: 14px;
        }
        .btn-apple {
            background: var(--apple-accent); color: #fff; border: none; padding: 15px;
            border-radius: 12px; width: 100%; font-weight: 700; cursor: pointer;
        }

        .playlist-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px; background: rgba(255,255,255,0.03); border-radius: 12px; margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1 style="font-size: 28px; font-weight: 800; margin-bottom: 40px; letter-spacing: -1.5px;">아카이브.</h1>
        
        <nav style="flex: 1;">
            <div class="nav-item active" onclick="nav('home', this)">홈</div>
            <div class="nav-item" onclick="nav('music', this)">음악 라이브러리</div>
            <div class="nav-item" onclick="nav('guest', this)">방명록</div>
        </nav>

        <div class="music-widget">
            <div class="now-playing" id="track-title">재생 대기 중...</div>
            <div class="progress-container" onclick="seek(event)">
                <div class="progress-bar" id="track-progress"></div>
            </div>
            <div class="controls">
                <button class="btn-play" style="background:none; color:#fff;" onclick="prev()">⏮</button>
                <button class="btn-play" id="master-play" onclick="togglePlay()">▶</button>
                <button class="btn-play" style="background:none; color:#fff;" onclick="next()">⏭</button>
            </div>
        </div>
    </aside>

    <main class="viewport">
        <section id="p-home" class="page active">
            <h1 style="font-size: 64px; font-weight: 800; letter-spacing: -3px; margin-bottom: 20px;">반갑습니다.</h1>
            <p style="font-size: 20px; color: var(--apple-sub); line-height: 1.5; max-width: 500px;">
                이곳은 선필의 개인 창작 데이터베이스입니다. 음악 라이브러리에서 곡을 추가하고 재생해 보세요.
            </p>
        </section>

        <section id="p-music" class="page">
            <h2 style="font-size: 32px; margin-bottom: 30px;">음악 라이브러리</h2>
            <div style="background: var(--apple-card); padding: 30px; border-radius: 24px; margin-bottom: 40px;">
                <p style="margin-bottom: 15px; font-weight: 600;">YouTube 주소 넣기</p>
                <input type="text" id="yt-input" class="input-apple" placeholder="https://www.youtube.com/watch?v=...">
                <button class="btn-apple" onclick="addMusic()">라이브러리에 추가</button>
            </div>
            
            <h3>플레이리스트</h3>
            <div id="playlist-container" style="margin-top: 20px;"></div>
        </section>

        <section id="p-guest" class="page">
            <h2 style="font-size: 32px; margin-bottom: 30px;">방명록</h2>
            <div style="max-width: 500px;">
                <input type="text" id="g-name" class="input-apple" placeholder="닉네임">
                <textarea id="g-msg" class="input-apple" rows="4" placeholder="메시지"></textarea>
                <button class="btn-apple" onclick="saveGuest()">전송하기</button>
            </div>
            <div id="g-list" style="margin-top: 40px;"></div>
        </section>
    </main>

    <div id="yt-engine" style="position: absolute; top: -9999px;"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player;
        let playlist = JSON.parse(localStorage.getItem('sunphil_list')) || [];
        let currentIdx = -1;

        // 1. 유튜브 API 초기화
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-engine', {
                height: '0', width: '0',
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.PLAYING) {
                document.getElementById('master-play').innerText = '⏸';
                updateProgress();
            } else {
                document.getElementById('master-play').innerText = '▶';
            }
            if (event.data == YT.PlayerState.ENDED) next();
        }

        // 2. 음악 추가 및 재생
        function addMusic() {
            const val = document.getElementById('yt-input').value;
            if(!val) return;
            const vid = val.split('v=')[1]?.split('&')[0] || val.split('/').pop();
            playlist.push({ id: vid, title: "Track " + (playlist.length + 1) });
            localStorage.setItem('sunphil_list', JSON.stringify(playlist));
            renderPlaylist();
            document.getElementById('yt-input').value = '';
        }

        function renderPlaylist() {
            const container = document.getElementById('playlist-container');
            container.innerHTML = playlist.map((item, i) => `
                <div class="playlist-item">
                    <span>${item.title}</span>
                    <button class="btn-apple" style="width: auto; padding: 8px 15px;" onclick="play(${i})">재생</button>
                </div>
            `).join('');
        }

        function play(index) {
            currentIdx = index;
            const item = playlist[currentIdx];
            document.getElementById('track-title').innerText = item.title;
            player.loadVideoById(item.id);
            player.playVideo();
        }

        function togglePlay() {
            if (currentIdx === -1 && playlist.length > 0) return play(0);
            const state = player.getPlayerState();
            if (state == 1) player.pauseVideo();
            else player.playVideo();
        }

        function next() { if(currentIdx < playlist.length - 1) play(currentIdx + 1); }
        function prev() { if(currentIdx > 0) play(currentIdx - 1); }

        function updateProgress() {
            setInterval(() => {
                if (player && player.getCurrentTime) {
                    const dur = player.getDuration();
                    const cur = player.getCurrentTime();
                    if (dur > 0) {
                        document.getElementById('track-progress').style.width = (cur / dur * 100) + '%';
                    }
                }
            }, 1000);
        }

        // [페이지 네비게이션]
        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
            el.classList.add('active');
        }

        // [방명록]
        function saveGuest() {
            const name = document.getElementById('g-name').value;
            const msg = document.getElementById('g-msg').value;
            if(!name || !msg) return;
            const list = JSON.parse(localStorage.getItem('sunphil_guest')) || [];
            list.push({name, msg});
            localStorage.setItem('sunphil_guest', JSON.stringify(list));
            renderGuest();
        }

        function renderGuest() {
            const container = document.getElementById('g-list');
            const list = JSON.parse(localStorage.getItem('sunphil_guest')) || [];
            container.innerHTML = list.map(m => `
                <div style="background:var(--apple-card); padding:20px; border-radius:15px; margin-bottom:10px;">
                    <b style="color:var(--apple-accent)">${m.name}</b>: ${m.msg}
                </div>
            `).reverse().join('');
        }

        window.onload = () => {
            renderPlaylist();
            renderGuest();
        };
    </script>
</body>
</html>
