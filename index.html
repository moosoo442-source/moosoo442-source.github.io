<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN-PHIL | TOTAL ARCHIVE</title>
    <style>
        :root {
            --bg: #000;
            --accent: #ff2d55;
            --card: rgba(28, 28, 30, 0.85);
            --glass: blur(40px) saturate(200%);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            height: 100vh; overflow: hidden;
        }

        /* [레이아웃 프레임] */
        .app-container { display: flex; height: 100vh; padding: 20px; gap: 20px; }

        /* [사이드바: 음악 중심] */
        .sidebar {
            width: 350px; background: var(--card); backdrop-filter: var(--glass);
            border-radius: 24px; border: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 30px;
        }

        .nav-section { margin-bottom: 40px; }
        .nav-item {
            padding: 14px 20px; border-radius: 12px; cursor: pointer;
            font-size: 16px; font-weight: 600; margin-bottom: 8px;
            transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .nav-item.active { background: var(--accent); }

        /* [뮤직 플레이어 UI] */
        .player-ui {
            margin-top: auto; background: rgba(0,0,0,0.4); border-radius: 20px;
            padding: 20px; border: 1px solid var(--border);
        }
        .song-info { margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        #current-title { font-size: 13px; font-weight: 700; color: var(--accent); }
        
        .controls { display: flex; justify-content: space-between; align-items: center; margin: 15px 0; }
        .ctrl-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 18px; }
        
        .progress-container { width: 100%; height: 4px; background: #333; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: var(--accent); border-radius: 2px; }

        /* [하위 페이지] */
        .main-view {
            flex-grow: 1; background: var(--card); backdrop-filter: var(--glass);
            border-radius: 24px; border: 1px solid var(--border);
            padding: 50px; overflow-y: auto;
        }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 유틸리티 */
        .input-dark {
            width: 100%; background: #111; border: 1px solid #333; padding: 12px;
            border-radius: 10px; color: #fff; margin-bottom: 10px; font-size: 13px;
        }
        .btn-accent { background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: 700; cursor: pointer; }
    </style>
</head>
<body>

<div class="app-container">
    <aside class="sidebar">
        <div class="nav-section">
            <h2 style="font-size: 24px; font-weight: 800; margin: 0 0 20px 0;">ARCHIVE</h2>
            <div class="nav-item active" onclick="show('home', this)">홈</div>
            <div class="nav-item" onclick="show('music-mgr', this)">음악 라이브러리</div>
            <div class="nav-item" onclick="show('guest', this)">방명록</div>
        </div>

        <div class="player-ui">
            <div class="song-info">
                <div style="font-size: 10px; opacity: 0.5; margin-bottom: 5px;">NOW PLAYING</div>
                <div id="current-title">재생 중인 곡 없음</div>
            </div>
            
            <div class="progress-container" id="prog-root">
                <div class="progress-bar" id="prog-fill"></div>
            </div>

            <div class="controls">
                <button class="ctrl-btn" onclick="prevSong()">⏮</button>
                <button class="ctrl-btn" id="play-pause" onclick="togglePlay()" style="font-size: 24px;">▶</button>
                <button class="ctrl-btn" onclick="nextSong()">⏭</button>
            </div>

            <input type="range" id="volume-slider" min="0" max="100" value="50" style="width:100%; accent-color:var(--accent);">
        </div>
    </aside>

    <main class="main-view">
        
        <section id="p-home" class="page active">
            <h1 style="font-size: 50px; font-weight: 900; letter-spacing: -2px;">모든 것이<br>흐르는 공간.</h1>
            <p style="color: #86868b; font-size: 18px; line-height: 1.6;">왼쪽의 음악 라이브러리에서 링크나 파일을 추가하면 플레이리스트가 생성됩니다.</p>
        </section>

        <section id="p-music-mgr" class="page">
            <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 30px;">음악 라이브러리</h2>
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px;">
                    <h3>YouTube 링크 추가</h3>
                    <input type="text" id="yt-url" class="input-dark" placeholder="유튜브 영상 주소 붙여넣기">
                    <button class="btn-accent" onclick="addYoutube()">플레이리스트에 추가</button>
                </div>
                <div style="background: rgba(255,255,255,0.03); padding: 25px; border-radius: 20px;">
                    <h3>로컬 MP3 파일 추가</h3>
                    <input type="file" id="mp3-file" class="input-dark" accept="audio/*">
                    <button class="btn-accent" onclick="addLocalFile()">파일 업로드 적용</button>
                </div>
            </div>

            <h3 style="margin-top: 40px;">현재 플레이리스트</h3>
            <div id="playlist-view" style="margin-top: 15px;">
                </div>
        </section>

        <section id="p-guest" class="page">
            <h2 style="font-size: 32px; font-weight: 800;">방명록</h2>
            <div style="max-width: 500px; margin-top: 30px;">
                <input type="text" id="g-name" class="input-dark" placeholder="닉네임">
                <textarea id="g-msg" class="input-dark" rows="4" placeholder="메시지 내용"></textarea>
                <button class="btn-accent" onclick="saveGuest()">작성하기</button>
            </div>
            <div id="g-list" style="margin-top: 30px;"></div>
        </section>

    </main>
</div>

<div id="youtube-engine" style="position: absolute; top: -9999px;"></div>
<audio id="local-engine"></audio>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
    // 1. 시스템 변수
    let playlist = JSON.parse(localStorage.getItem('sunphil_playlist')) || [];
    let currentIndex = -1;
    let ytPlayer;
    const localAudio = document.getElementById('local-engine');
    const playPauseBtn = document.getElementById('play-pause');

    // 2. 유튜브 API 초기화
    function onYouTubeIframeAPIReady() {
        ytPlayer = new YT.Player('youtube-engine', {
            height: '0', width: '0',
            events: {
                'onStateChange': onYTStateChange,
                'onReady': () => console.log("유튜브 준비 완료")
            }
        });
    }

    function onYTStateChange(event) {
        if (event.data === YT.PlayerState.ENDED) nextSong();
        if (event.data === YT.PlayerState.PLAYING) {
            playPauseBtn.innerText = '⏸';
            updateProgress();
        }
    }

    // 3. 음악 추가 로직
    function addYoutube() {
        const url = document.getElementById('yt-url').value;
        if(!url) return;
        const vid = url.split('v=')[1]?.split('&')[0] || url.split('/').pop();
        playlist.push({ type: 'yt', id: vid, title: 'YouTube Track ' + (playlist.length + 1) });
        saveAndRender();
    }

    function addLocalFile() {
        const file = document.getElementById('mp3-file').files[0];
        if(!file) return;
        const url = URL.createObjectURL(file);
        playlist.push({ type: 'local', id: url, title: file.name });
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem('sunphil_playlist', JSON.stringify(playlist));
        renderPlaylist();
    }

    function renderPlaylist() {
        const view = document.getElementById('playlist-view');
        view.innerHTML = playlist.map((s, i) => `
            <div style="display:flex; justify-content:space-between; padding:15px; background:rgba(255,255,255,0.05); border-radius:10px; margin-bottom:10px;">
                <span>${s.title}</span>
                <button onclick="playTarget(${i})" style="background:var(--accent); border:none; color:#fff; border-radius:5px; cursor:pointer;">재생</button>
            </div>
        `).join('');
    }

    // 4. 플레이어 제어 로직
    function playTarget(index) {
        currentIndex = index;
        const song = playlist[currentIndex];
        document.getElementById('current-title').innerText = song.title;

        // 다른 엔진 중지
        ytPlayer.stopVideo();
        localAudio.pause();

        if (song.type === 'yt') {
            ytPlayer.loadVideoById(song.id);
            ytPlayer.playVideo();
        } else {
            localAudio.src = song.id;
            localAudio.play();
            playPauseBtn.innerText = '⏸';
        }
    }

    function togglePlay() {
        if (currentIndex === -1) return;
        const song = playlist[currentIndex];
        
        if (song.type === 'yt') {
            const state = ytPlayer.getPlayerState();
            if (state === 1) { ytPlayer.pauseVideo(); playPauseBtn.innerText = '▶'; }
            else { ytPlayer.playVideo(); playPauseBtn.innerText = '⏸'; }
        } else {
            if (localAudio.paused) { localAudio.play(); playPauseBtn.innerText = '⏸'; }
            else { localAudio.pause(); playPauseBtn.innerText = '▶'; }
        }
    }

    function nextSong() {
        if (currentIndex < playlist.length - 1) playTarget(currentIndex + 1);
    }

    function prevSong() {
        if (currentIndex > 0) playTarget(currentIndex - 1);
    }

    // 5. 프로그레스 바 실시간 업데이트
    function updateProgress() {
        setInterval(() => {
            let ratio = 0;
            if (currentIndex === -1) return;
            const song = playlist[currentIndex];
            if (song.type === 'yt') {
                ratio = (ytPlayer.getCurrentTime() / ytPlayer.getDuration()) * 100;
            } else {
                ratio = (localAudio.currentTime / localAudio.duration) * 100;
            }
            document.getElementById('prog-fill').style.width = ratio + '%';
        }, 500);
    }

    // [시스템 스위칭]
    function show(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('p-' + id).classList.add('active');
        el.classList.add('active');
    }

    // 볼륨 조절
    document.getElementById('volume-slider').oninput = function() {
        const vol = this.value;
        localAudio.volume = vol / 100;
        if (ytPlayer) ytPlayer.setVolume(vol);
    };

    window.onload = () => {
        renderPlaylist();
        updateProgress();
    };
</script>

</body>
</html>
