<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN-PHIL | TOTAL ARCHIVE</title>
    <style>
        /* 1. 글로벌 & 애플 미감 베이스 */
        :root {
            --bg: #000;
            --accent: #ff2d55;
            --surface: rgba(28, 28, 30, 0.6);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-sub: #86868b;
            --glass: blur(40px) saturate(200%);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; }
        body { background: var(--bg); color: var(--text-main); height: 100vh; display: flex; overflow: hidden; }
        input, textarea, button { font-family: inherit; outline: none; }

        /* 2. 사이드바 (네비게이션 & 뮤직 제어) */
        .sidebar {
            width: 320px; background: rgba(15, 15, 15, 0.85); backdrop-filter: var(--glass);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 25px;
            z-index: 10;
        }
        .logo { font-size: 28px; font-weight: 800; letter-spacing: -1px; margin-bottom: 40px; }
        
        .nav-list { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .nav-item {
            padding: 16px 20px; border-radius: 14px; cursor: pointer; font-size: 16px; font-weight: 600;
            color: var(--text-sub); transition: all 0.2s ease; display: flex; align-items: center; gap: 10px;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .nav-item.active { background: var(--accent); color: #fff; }

        /* 뮤직 플레이어 위젯 */
        .music-widget { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 25px; margin-top: auto; }
        .m-title { font-size: 12px; font-weight: 800; color: var(--accent); margin-bottom: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .m-progress { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-bottom: 20px; cursor: pointer; position: relative; }
        .m-bar { position: absolute; left: 0; top: 0; height: 100%; background: #fff; width: 0%; border-radius: 2px; transition: width 0.1s linear; }
        .m-controls { display: flex; justify-content: space-between; align-items: center; padding: 0 10px; }
        .m-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 20px; transition: 0.2s; }
        .m-btn:hover { transform: scale(1.1); color: var(--accent); }

        /* 3. 메인 뷰포트 (페이지 전환 영역) */
        .main-content { flex: 1; position: relative; background: radial-gradient(circle at top right, #1a1a1c, #000); }
        .page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; padding: 60px 80px; overflow-y: auto; opacity: 0; visibility: hidden; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); transform: translateY(20px); }
        .page.active { opacity: 1; visibility: visible; transform: translateY(0); z-index: 5; }

        /* 4. 공통 UI 컴포넌트 */
        h1 { font-size: 48px; font-weight: 800; letter-spacing: -2px; margin-bottom: 40px; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 35px; margin-bottom: 30px; backdrop-filter: var(--glass); }
        
        .input-box {
            width: 100%; background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); padding: 18px 20px;
            border-radius: 16px; color: #fff; font-size: 15px; margin-bottom: 15px; transition: 0.2s;
        }
        .input-box:focus { border-color: var(--accent); background: rgba(0,0,0,0.8); }
        
        .btn-submit {
            background: var(--accent); color: #fff; border: none; padding: 18px 30px; border-radius: 16px;
            font-weight: 700; font-size: 16px; cursor: pointer; width: 100%; transition: 0.2s;
        }
        .btn-submit:active { transform: scale(0.98); }

        /* 데이터 출력 리스트 스타일 */
        .data-list { display: flex; flex-direction: column; gap: 15px; }
        .data-item { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 25px; border-radius: 20px; }
        
        /* 캐릭터 그리드 */
        .grid-layout { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .char-card { display: flex; gap: 20px; align-items: center; background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 20px; border-radius: 20px; }
        .char-pic { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; background: #222; }

    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">ARCHIVE.</div>
        <div class="nav-list">
            <div class="nav-item active" onclick="switchPage('home')">홈 대시보드</div>
            <div class="nav-item" onclick="switchPage('blog')">블로그 포스팅</div>
            <div class="nav-item" onclick="switchPage('chars')">캐릭터 도감</div>
            <div class="nav-item" onclick="switchPage('music')">뮤직 & 시스템</div>
        </div>

        <div class="music-widget">
            <div class="m-title" id="m-status">음악 대기 중...</div>
            <div class="m-progress"><div class="m-bar" id="m-bar"></div></div>
            <div class="m-controls">
                <button class="m-btn" onclick="playPrev()">⏮</button>
                <button class="m-btn" id="m-play-btn" onclick="togglePlay()" style="font-size: 26px;">▶</button>
                <button class="m-btn" onclick="playNext()">⏭</button>
            </div>
        </div>
    </aside>

    <main class="main-content">
        
        <section id="page-home" class="page active">
            <h1>시스템 가동 중</h1>
            <div class="panel">
                <p style="color: var(--text-sub); font-size: 18px; line-height: 1.6;">
                    선필 아카이브에 오신 것을 환영합니다.<br>
                    왼쪽 메뉴를 클릭하여 각 페이지로 이동할 수 있으며, 입력한 모든 데이터는 <strong>즉시 화면에 반영되고 영구적으로 저장</strong>됩니다.
                </p>
            </div>
        </section>

        <section id="page-blog" class="page">
            <h1>블로그 포스트</h1>
            <div class="panel">
                <input type="text" id="post-title" class="input-box" placeholder="글 제목을 입력하세요">
                <textarea id="post-content" class="input-box" rows="5" placeholder="기록할 내용을 자유롭게 적어주세요"></textarea>
                <button class="btn-submit" onclick="submitPost()">포스팅 올리기</button>
            </div>
            <div id="post-render-area" class="data-list"></div>
        </section>

        <section id="page-chars" class="page">
            <h1>캐릭터 아카이브</h1>
            <div class="panel">
                <div style="display: flex; gap: 15px;">
                    <input type="text" id="char-name" class="input-box" placeholder="캐릭터 이름">
                    <input type="text" id="char-tag" class="input-box" placeholder="특징 / 태그">
                </div>
                <input type="text" id="char-img" class="input-box" placeholder="이미지 URL 주소 (선택사항)">
                <button class="btn-submit" onclick="submitChar()">캐릭터 등록하기</button>
            </div>
            <div id="char-render-area" class="grid-layout"></div>
        </section>

        <section id="page-music" class="page">
            <h1>뮤직 라이브러리</h1>
            <div class="panel">
                <p style="color: var(--text-sub); margin-bottom: 15px;">유튜브 영상 주소 뒷부분의 <strong>ID(예: dQw4w9WgXcQ)</strong>만 입력하세요.</p>
                <input type="text" id="music-id" class="input-box" placeholder="유튜브 비디오 ID">
                <button class="btn-submit" onclick="submitMusic()">플레이리스트에 곡 추가</button>
            </div>
            <div id="music-render-area" class="data-list"></div>
        </section>

    </main>

    <div id="yt-player" style="display: none;"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        // ==========================================
        // 1. 데이터베이스 베이스 세팅 (LocalStorage)
        // ==========================================
        let db = {
            posts: JSON.parse(localStorage.getItem('sunphil_posts')) || [],
            chars: JSON.parse(localStorage.getItem('sunphil_chars')) || [],
            music: JSON.parse(localStorage.getItem('sunphil_music')) || []
        };

        // 데이터 저장 및 화면 갱신 통합 함수
        function saveData(key, array) {
            localStorage.setItem('sunphil_' + key, JSON.stringify(array));
            if(key === 'posts') renderPosts();
            if(key === 'chars') renderChars();
            if(key === 'music') renderMusic();
        }

        // ==========================================
        // 2. 페이지 네비게이션 엔진
        // ==========================================
        function switchPage(targetId) {
            // 버튼 액티브 효과
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            // 페이지 전환
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById('page-' + targetId).classList.add('active');
        }

        // ==========================================
        // 3. 블로그 포스팅 기능
        // ==========================================
        function submitPost() {
            const title = document.getElementById('post-title').value.trim();
            const content = document.getElementById('post-content').value.trim();
            
            if(!title || !content) { alert('제목과 내용을 모두 입력해주세요!'); return; }
            
            const dateStr = new Date().toLocaleString('ko-KR');
            db.posts.unshift({ title, content, date: dateStr }); // 최신 글이 위로 오게 배열 맨 앞에 추가
            saveData('posts', db.posts);
            
            // 입력창 초기화
            document.getElementById('post-title').value = '';
            document.getElementById('post-content').value = '';
        }

        function renderPosts() {
            const container = document.getElementById('post-render-area');
            if(db.posts.length === 0) {
                container.innerHTML = '<div style="color:#666; text-align:center; padding: 20px;">작성된 포스트가 없습니다.</div>';
                return;
            }
            container.innerHTML = db.posts.map(post => `
                <div class="data-item">
                    <h2 style="margin-bottom: 15px; font-size: 24px;">${post.title}</h2>
                    <p style="color: #ccc; line-height: 1.6; white-space: pre-wrap;">${post.content}</p>
                    <div style="margin-top: 20px; font-size: 12px; color: var(--accent);">${post.date}</div>
                </div>
            `).join('');
        }

        // ==========================================
        // 4. 캐릭터 도감 기능
        // ==========================================
        function submitChar() {
            const name = document.getElementById('char-name').value.trim();
            const tag = document.getElementById('char-tag').value.trim();
            const img = document.getElementById('char-img').value.trim();
            
            if(!name) { alert('캐릭터 이름은 필수입니다!'); return; }
            
            db.chars.push({ name, tag, img });
            saveData('chars', db.chars);
            
            document.getElementById('char-name').value = '';
            document.getElementById('char-tag').value = '';
            document.getElementById('char-img').value = '';
        }

        function renderChars() {
            const container = document.getElementById('char-render-area');
            container.innerHTML = db.chars.map(char => `
                <div class="char-card">
                    <img src="${char.img || 'https://via.placeholder.com/150/222222/555555?text=No+Img'}" class="char-pic">
                    <div>
                        <div style="font-size: 20px; font-weight: 800; margin-bottom: 5px;">${char.name}</div>
                        <div style="font-size: 13px; color: var(--accent);">${char.tag || '태그 없음'}</div>
                    </div>
                </div>
            `).join('');
        }

        // ==========================================
        // 5. 유튜브 뮤직 엔진
        // ==========================================
        let ytPlayer, currentTrackIndex = -1;

        function onYouTubeIframeAPIReady() {
            ytPlayer = new YT.Player('yt-player', {
                events: {
                    'onStateChange': function(event) {
                        const btn = document.getElementById('m-play-btn');
                        if (event.data === 1) { btn.innerText = '⏸'; } // 재생중
                        else { btn.innerText = '▶'; } // 정지됨
                        if (event.data === 0) { playNext(); } // 곡 끝남
                    }
                }
            });
        }

        function submitMusic() {
            const id = document.getElementById('music-id').value.trim();
            if(!id) return;
            
            db.music.push({ id: id, title: `유튜브 트랙 [${id}]` });
            saveData('music', db.music);
            document.getElementById('music-id').value = '';
        }

        function renderMusic() {
            const container = document.getElementById('music-render-area');
            container.innerHTML = db.music.map((track, index) => `
                <div class="data-item" style="display:flex; justify-content:space-between; align-items:center; padding: 15px 25px;">
                    <span style="font-weight:600;">🎵 ${track.title}</span>
                    <button class="btn-submit" style="width:auto; padding: 10px 20px; border-radius:10px;" onclick="forcePlay(${index})">재생</button>
                </div>
            `).join('');
        }

        function forcePlay(index) {
            currentTrackIndex = index;
            const track = db.music[currentTrackIndex];
            document.getElementById('m-status').innerText = track.title;
            ytPlayer.loadVideoById(track.id);
            ytPlayer.playVideo();
        }

        function togglePlay() {
            if (currentTrackIndex === -1 && db.music.length > 0) { forcePlay(0); return; }
            if (!ytPlayer || currentTrackIndex === -1) return;
            
            if (ytPlayer.getPlayerState() === 1) ytPlayer.pauseVideo();
            else ytPlayer.playVideo();
        }

        function playNext() { if (currentTrackIndex < db.music.length - 1) forcePlay(currentTrackIndex + 1); }
        function playPrev() { if (currentTrackIndex > 0) forcePlay(currentTrackIndex - 1); }

        // 프로그레스 바 실시간 업데이트
        setInterval(() => {
            if(ytPlayer && ytPlayer.getCurrentTime && ytPlayer.getDuration) {
                const duration = ytPlayer.getDuration();
                if(duration > 0) {
                    const percentage = (ytPlayer.getCurrentTime() / duration) * 100;
                    document.getElementById('m-bar').style.width = percentage + '%';
                }
            }
        }, 500);

        // ==========================================
        // 6. 시스템 초기화 (가장 중요)
        // ==========================================
        window.onload = function() {
            // 브라우저가 열리자마자 저장된 데이터를 화면에 그려줍니다.
            renderPosts();
            renderChars();
            renderMusic();
        };
    </script>
</body>
</html>
