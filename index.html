<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN-PHIL | ARCHIVE SYSTEM</title>
    <style>
        :root {
            --bg: #000;
            --accent: #ff2d55;
            --card: rgba(28, 28, 30, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --glass: blur(40px) saturate(180%);
            --sub-text: #86868b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body {
            background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            height: 100vh; overflow: hidden; display: flex;
        }

        /* [1] 하이테크 사이드바 */
        .sidebar {
            width: 300px; background: rgba(10, 10, 10, 0.85); backdrop-filter: var(--glass);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 45px 25px;
        }
        .logo { font-size: 26px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 50px; color: #fff; }
        
        .nav-group { flex: 1; }
        .nav-item {
            padding: 16px 20px; border-radius: 14px; cursor: pointer; font-size: 16px; 
            margin-bottom: 8px; color: var(--sub-text); transition: 0.3s cubic-bezier(0.2, 1, 0.3, 1);
            display: flex; align-items: center; gap: 12px; font-weight: 600;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .nav-item.active { background: var(--accent); color: #fff; box-shadow: 0 10px 20px rgba(255, 45, 85, 0.3); }

        /* [2] 올인원 뮤직 스테이션 */
        .music-station {
            background: var(--card); border-radius: 22px; padding: 22px; border: 1px solid var(--border);
        }
        .track-info { font-size: 11px; font-weight: 800; color: var(--accent); margin-bottom: 12px; letter-spacing: 1px; }
        .progress-root { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-bottom: 15px; cursor: pointer; }
        .progress-fill { height: 100%; background: #fff; width: 0%; border-radius: 2px; transition: 0.1s linear; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 25px; }
        .c-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 20px; opacity: 0.8; transition: 0.2s; }
        .c-btn:hover { opacity: 1; transform: scale(1.1); }

        /* [3] 메인 뷰포트 */
        .viewport { flex: 1; padding: 70px; overflow-y: auto; background: radial-gradient(circle at top right, #1c1c1e, #000); }
        .page { display: none; max-width: 900px; margin: 0 auto; }
        .page.active { display: block; animation: appleReveal 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes appleReveal { from { opacity: 0; transform: translateY(30px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* [4] 컴포넌트 라이브러리 */
        h1 { font-size: 52px; font-weight: 800; margin-bottom: 40px; letter-spacing: -2.5px; }
        .apple-card { background: var(--card); border: 1px solid var(--border); border-radius: 28px; padding: 35px; margin-bottom: 25px; backdrop-filter: var(--glass); }
        
        .input-group { margin-bottom: 15px; }
        input, textarea {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); padding: 18px;
            border-radius: 16px; color: #fff; font-size: 16px; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--accent); background: rgba(255,255,255,0.08); }
        
        .btn-action {
            background: var(--accent); color: #fff; border: none; padding: 18px 30px;
            border-radius: 16px; font-weight: 700; cursor: pointer; transition: 0.3s; width: 100%;
        }
        .btn-action:active { transform: scale(0.97); opacity: 0.9; }

        /* 데이터 리스트 스타일 */
        .list-item { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; margin-bottom: 12px; border: 1px solid var(--border); }
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .char-card { background: var(--card); border-radius: 24px; padding: 20px; border: 1px solid var(--border); display: flex; gap: 20px; align-items: center; }
        .char-img { width: 80px; height: 80px; border-radius: 18px; object-fit: cover; background: #222; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="logo">SUN-PHIL.</div>
        <nav class="nav-group">
            <div class="nav-item active" onclick="nav('home', this)">✦ 대시보드</div>
            <div class="nav-item" onclick="nav('blog', this)">✦ 아카이브 로그</div>
            <div class="nav-item" onclick="nav('chars', this)">✦ 캐릭터 엔진</div>
            <div class="nav-item" onclick="nav('settings', this)">✦ 시스템 설정</div>
        </nav>

        <div class="music-station">
            <div class="track-info" id="now-playing">ENGINE STANDBY</div>
            <div class="progress-root"><div class="progress-fill" id="p-bar"></div></div>
            <div class="controls">
                <button class="c-btn" onclick="prev()">⏮</button>
                <button class="c-btn" id="m-toggle" onclick="toggleM()" style="font-size: 28px;">▶</button>
                <button class="c-btn" onclick="next()">⏭</button>
            </div>
        </div>
    </aside>

    <main class="viewport">
        <section id="p-home" class="page active">
            <h1>시스템 정상 가동.</h1>
            <div class="apple-card">
                <p style="color:var(--sub-text); line-height: 1.8; font-size: 19px;">
                    모든 하위 페이지가 완벽하게 구성되었습니다. <br>
                    데이터 입력, 저장, 재생 기능이 실시간으로 동기화됩니다.
                </p>
            </div>
        </section>

        <section id="p-blog" class="page">
            <h1>ARCHIVE LOG</h1>
            <div class="apple-card">
                <input type="text" id="b-title" placeholder="로그 제목" style="margin-bottom:10px;">
                <textarea id="b-content" rows="4" placeholder="기록할 내용을 입력하세요..."></textarea>
                <button class="btn-action" style="margin-top:15px;" onclick="addPost()">로그 데이터 저장</button>
            </div>
            <div id="blog-container"></div>
        </section>

        <section id="p-chars" class="page">
            <h1>CHAR ENGINE</h1>
            <div class="apple-card">
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-bottom:10px;">
                    <input type="text" id="c-name" placeholder="이름">
                    <input type="text" id="c-tag" placeholder="직업/소속">
                </div>
                <input type="text" id="c-img" placeholder="이미지 URL (이미지 주소 복사)">
                <button class="btn-action" style="margin-top:15px;" onclick="addChar()">캐릭터 데이터 생성</button>
            </div>
            <div class="char-grid" id="char-container"></div>
        </section>

        <section id="p-settings" class="page">
            <h1>SYSTEM SETTINGS</h1>
            <div class="apple-card">
                <h3>음악 라이브러리 동기화</h3>
                <p style="color:var(--sub-text); margin: 10px 0 20px;">유튜브 비디오 ID를 입력하여 플레이리스트에 추가하세요.</p>
                <input type="text" id="m-id" placeholder="유튜브 ID (예: jfKfPfyJRdk)">
                <button class="btn-action" style="margin-top:15px;" onclick="addMusic()">플레이리스트 업데이트</button>
            </div>
            <div id="music-list-container"></div>
        </section>
    </main>

    <div id="yt-engine" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, playlist = JSON.parse(localStorage.getItem('sp_music')) || [], cur = -1;

        // [1] 음악 코어 엔진
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-engine', {
                events: {
                    'onStateChange': (e) => {
                        document.getElementById('m-toggle').innerText = (e.data == 1) ? '⏸' : '▶';
                        if(e.data == 0) next();
                    }
                }
            });
        }

        function addMusic() {
            const id = document.getElementById('m-id').value;
            if(!id) return;
            playlist.push({id, title: "DATA_STRM_" + id.slice(0,4)});
            localStorage.setItem('sp_music', JSON.stringify(playlist));
            renderMusicList();
            document.getElementById('m-id').value = '';
        }

        function renderMusicList() {
            document.getElementById('music-list-container').innerHTML = playlist.map((s,i) => `
                <div class="list-item" onclick="playS(${i})" style="cursor:pointer; display:flex; justify-content:space-between;">
                    <span>TRACK: ${s.id}</span>
                    <span style="color:var(--accent)">LOAD</span>
                </div>
            `).join('');
        }

        function playS(i) {
            cur = i;
            document.getElementById('now-playing').innerText = playlist[cur].title;
            player.loadVideoById(playlist[cur].id);
            player.playVideo();
        }

        function toggleM() {
            if(cur == -1 && playlist.length > 0) return playS(0);
            (player.getPlayerState() == 1) ? player.pauseVideo() : player.playVideo();
        }

        function next() { if(cur < playlist.length - 1) playS(cur + 1); }
        function prev() { if(cur > 0) playS(cur - 1); }

        setInterval(() => {
            if(player && player.getCurrentTime) {
                const p = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('p-bar').style.width = (p || 0) + '%';
            }
        }, 500);

        // [2] 네비게이션 & UI
        function nav(id, el) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('p-' + id).classList.add('active');
        }

        // [3] 블로그 엔진
        function addPost() {
            const t = document.getElementById('b-title').value, c = document.getElementById('b-content').value;
            if(!t || !c) return;
            let posts = JSON.parse(localStorage.getItem('sp_posts')) || [];
            posts.push({t, c, date: new Date().toLocaleDateString()});
            localStorage.setItem('sp_posts', JSON.stringify(posts));
            renderPosts();
            document.getElementById('b-title').value = ''; document.getElementById('b-content').value = '';
        }

        function renderPosts() {
            let posts = JSON.parse(localStorage.getItem('sp_posts')) || [];
            document.getElementById('blog-container').innerHTML = posts.reverse().map(p => `
                <div class="apple-card">
                    <h2 style="margin-bottom:10px;">${p.t}</h2>
                    <p style="color:#ccc; font-size:16px; line-height:1.6;">${p.c}</p>
                    <div style="margin-top:20px; font-size:12px; color:var(--accent); font-weight:800;">${p.date}</div>
                </div>
            `).join('');
        }

        // [4] 캐릭터 엔진
        function addChar() {
            const n = document.getElementById('c-name').value, t = document.getElementById('c-tag').value, i = document.getElementById('c-img').value;
            if(!n) return;
            let chars = JSON.parse(localStorage.getItem('sp_chars')) || [];
            chars.push({n, t, i});
            localStorage.setItem('sp_chars', JSON.stringify(chars));
            renderChars();
            document.getElementById('c-name').value = ''; document.getElementById('c-tag').value = ''; document.getElementById('c-img').value = '';
        }

        function renderChars() {
            let chars = JSON.parse(localStorage.getItem('sp_chars')) || [];
            document.getElementById('char-container').innerHTML = chars.map(c => `
                <div class="char-card">
                    <img src="${c.i || 'https://via.placeholder.com/80'}" class="char-img">
                    <div>
                        <div style="font-weight:800; font-size:18px;">${c.n}</div>
                        <div style="font-size:13px; color:var(--accent); margin-top:4px;">${c.t}</div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = () => { renderPosts(); renderChars(); renderMusicList(); };
    </script>
</body>
</html>
