<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN-PHIL | ARCHIVE SYSTEM</title>
    <style>
        :root {
            --bg: #000;
            --accent: #ff2d55;
            --card: rgba(28, 28, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1);
            --glass: blur(30px) saturate(180%);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body {
            margin: 0; background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            height: 100vh; overflow: hidden;
        }

        .layout { display: flex; height: 100vh; padding: 25px; gap: 25px; }

        /* [사이드바] */
        .sidebar {
            width: 320px; background: var(--card); backdrop-filter: var(--glass);
            border-radius: 24px; border: 1px solid var(--border);
            display: flex; flex-direction: column; padding: 35px 25px;
        }

        .nav-item {
            padding: 16px 20px; border-radius: 14px; cursor: pointer;
            font-size: 17px; font-weight: 600; margin-bottom: 10px;
            transition: 0.3s; display: flex; align-items: center; gap: 12px;
        }
        .nav-item:hover { background: rgba(255, 255, 255, 0.05); }
        .nav-item.active { background: var(--accent); color: #fff; }

        /* [음악 엔진 컨트롤러] */
        .music-engine {
            margin-top: auto; background: rgba(0,0,0,0.3); border-radius: 18px; padding: 20px;
            border: 1px solid var(--border);
        }
        .music-input {
            width: 100%; background: #000; border: 1px solid #333;
            color: #fff; font-size: 11px; padding: 8px; border-radius: 8px; margin-bottom: 10px;
        }

        /* [메인 뷰포트] */
        .viewport {
            flex-grow: 1; background: var(--card); backdrop-filter: var(--glass);
            border-radius: 24px; border: 1px solid var(--border);
            padding: 60px; overflow-y: auto; position: relative;
        }

        .page { display: none; animation: slideUp 0.5s cubic-bezier(0.2, 1, 0.3, 1); }
        .page.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* [컴포넌트] */
        .header { font-size: 56px; font-weight: 800; letter-spacing: -2.5px; margin-bottom: 40px; }
        
        /* 캐릭터 리스트 동적 카드 */
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
        .char-card {
            background: rgba(255,255,255,0.03); border-radius: 20px; border: 1px solid var(--border);
            overflow: hidden; transition: 0.4s; padding-bottom: 15px;
        }
        .char-card:hover { transform: translateY(-8px); border-color: var(--accent); }
        .char-img { width: 100%; aspect-ratio: 1; background: #222; object-fit: cover; }
        .char-info { padding: 15px; text-align: center; }

        /* 입력 폼 스타일 */
        .form-group { background: rgba(255,255,255,0.05); padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        input, textarea {
            width: 100%; background: #1c1c1e; border: 1px solid #3a3a3c;
            border-radius: 12px; padding: 15px; color: #fff; margin-bottom: 12px; outline: none;
        }
        .btn {
            background: var(--accent); color: white; border: none; padding: 14px 28px;
            border-radius: 12px; font-weight: 700; cursor: pointer; transition: 0.2s;
        }
        .btn:active { transform: scale(0.95); }

        /* 방명록 리스트 */
        .guest-item {
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 16px; margin-bottom: 15px;
            border-left: 4px solid var(--accent);
        }
    </style>
</head>
<body>

<div class="layout">
    <aside class="sidebar">
        <div style="margin-bottom: 50px;">
            <div style="font-size: 28px; font-weight: 800;">ARCHIVE.</div>
            <div style="font-size: 14px; color: #86868b;">관리자: 선필 (Sun-phil)</div>
        </div>

        <nav>
            <div class="nav-item active" onclick="switchPage('home', this)">✦ 대시보드</div>
            <div class="nav-item" onclick="switchPage('chars', this)">✦ 캐릭터 엔진</div>
            <div class="nav-item" onclick="switchPage('docs', this)">✦ 장문 아카이브</div>
            <div class="nav-item" onclick="switchPage('guest', this)">✦ 방명록 소통</div>
        </nav>

        <div class="music-engine">
            <div style="font-size: 11px; font-weight: 700; color: var(--accent); margin-bottom: 10px;">BGM ENGINE V.1.0</div>
            <input type="text" id="music-url" class="music-input" placeholder="MP3 또는 유튜브 주소 입력">
            <button class="btn" style="width:100%; font-size: 12px; padding: 8px;" onclick="loadMusic()">음악 적용</button>
            <div id="player-container" style="margin-top:15px;">
                <audio id="audio-player" controls style="width: 100%; filter: invert(1); height: 30px;"></audio>
            </div>
        </div>
    </aside>

    <main class="viewport">
        <section id="page-home" class="page active">
            <h1 class="header">진짜로<br>작동하는 공간.</h1>
            <div class="form-group" style="max-width: 600px;">
                <p style="font-size: 18px; color: #86868b; line-height: 1.6;">
                    단순한 그림이 아닙니다. 캐릭터를 추가하고, 음악을 틀고, 글을 남겨보세요. 
                    모든 데이터는 브라우저에 실시간으로 저장되어 새로고침해도 유지됩니다.
                </p>
            </div>
        </section>

        <section id="page-chars" class="page">
            <h1 class="header">캐릭터 엔진</h1>
            <div class="form-group">
                <h3>새 캐릭터 등록</h3>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="char-name" placeholder="캐릭터 이름">
                    <input type="text" id="char-tag" placeholder="직업/나이 (예: 검사/19세)">
                </div>
                <input type="text" id="char-img" placeholder="이미지 URL (직접 넣기)">
                <button class="btn" onclick="addCharacter()">데이터베이스에 추가</button>
            </div>
            <div class="char-grid" id="char-list-container">
                </div>
        </section>

        <section id="page-docs" class="page">
            <h1 class="header">장문 기록</h1>
            <div class="form-group">
                <textarea id="doc-content" rows="15" placeholder="세계관 서사나 설정을 아주 길게 입력하세요."></textarea>
                <button class="btn" onclick="saveDoc()">기록 저장하기</button>
            </div>
        </section>

        <section id="page-guest" class="page">
            <h1 class="header">방명록</h1>
            <div class="form-group">
                <input type="text" id="guest-name" placeholder="닉네임">
                <textarea id="guest-msg" rows="3" placeholder="내용을 입력하세요."></textarea>
                <button class="btn" onclick="addGuestMsg()">전송</button>
            </div>
            <div id="guest-list"></div>
        </section>
    </main>
</div>

<div id="yt-wrap" style="display:none"></div>

<script>
    // [시스템 로직: 페이지 전환]
    function switchPage(id, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.getElementById('page-' + id).classList.add('active');
        el.classList.add('active');
    }

    // [음악 엔진]
    function loadMusic() {
        const url = document.getElementById('music-url').value;
        const player = document.getElementById('audio-player');
        const ytWrap = document.getElementById('yt-wrap');

        if(url.includes('youtube.com') || url.includes('youtu.be')) {
            const vid = url.split('v=')[1] || url.split('/').pop();
            ytWrap.innerHTML = `<iframe width="0" height="0" src="https://www.youtube.com/embed/${vid}?autoplay=1" frameborder="0"></iframe>`;
            alert('유튜브 음악이 배경에서 재생됩니다.');
        } else {
            player.src = url;
            player.play();
        }
    }

    // [캐릭터 엔진: 데이터 저장 & 불러오기]
    let characters = JSON.parse(localStorage.getItem('myChars')) || [];

    function renderChars() {
        const container = document.getElementById('char-list-container');
        container.innerHTML = characters.map((c, i) => `
            <div class="char-card">
                <img src="${c.img || 'https://via.placeholder.com/300'}" class="char-img">
                <div class="char-info">
                    <div style="font-weight: 800; font-size: 18px;">${c.name}</div>
                    <div style="font-size: 12px; color: var(--accent);">${c.tag}</div>
                    <button onclick="deleteChar(${i})" style="margin-top:10px; background:none; border:none; color:#555; cursor:pointer; font-size:10px;">삭제</button>
                </div>
            </div>
        `).join('');
    }

    function addCharacter() {
        const name = document.getElementById('char-name').value;
        const tag = document.getElementById('char-tag').value;
        const img = document.getElementById('char-img').value;
        if(!name) return;
        characters.push({name, tag, img});
        localStorage.setItem('myChars', JSON.stringify(characters));
        renderChars();
    }

    function deleteChar(i) {
        characters.splice(i, 1);
        localStorage.setItem('myChars', JSON.stringify(characters));
        renderChars();
    }

    // [방명록 엔진]
    let messages = JSON.parse(localStorage.getItem('myGuest')) || [];

    function renderGuest() {
        const list = document.getElementById('guest-list');
        list.innerHTML = messages.map(m => `
            <div class="guest-item">
                <div style="font-weight: 800; margin-bottom: 5px;">${m.name}</div>
                <div style="font-size: 14px; opacity: 0.8;">${m.msg}</div>
            </div>
        `).reverse().join('');
    }

    function addGuestMsg() {
        const name = document.getElementById('guest-name').value;
        const msg = document.getElementById('guest-msg').value;
        if(!name || !msg) return;
        messages.push({name, msg});
        localStorage.setItem('myGuest', JSON.stringify(messages));
        renderGuest();
    }

    // [문서 저장 엔진]
    function saveDoc() {
        const content = document.getElementById('doc-content').value;
        localStorage.setItem('myDoc', content);
        alert('기록이 안전하게 보관되었습니다.');
    }

    // 초기화
    window.onload = () => {
        renderChars();
        renderGuest();
        document.getElementById('doc-content').value = localStorage.getItem('myDoc') || '';
    };
</script>

</body>
</html>
