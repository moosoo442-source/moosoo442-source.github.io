<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUN-PHIL | ARCHIVE</title>
    <style>
        :root {
            --bg: #000;
            --accent: #ff2d55;
            --card: rgba(28, 28, 30, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
        body {
            background: var(--bg); color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif;
            height: 100vh; overflow: hidden; display: flex;
        }

        /* 사이드바 */
        .sidebar {
            width: 300px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(50px);
            border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 40px 20px;
        }
        .nav-item {
            padding: 15px; border-radius: 12px; cursor: pointer; font-size: 16px; 
            margin-bottom: 5px; color: #86868b; transition: 0.2s;
        }
        .nav-item.active { background: var(--accent); color: #fff; font-weight: 600; }

        /* 플레이어 위젯 */
        .player-widget {
            margin-top: auto; background: var(--card); border-radius: 20px; padding: 20px; border: 1px solid var(--border);
        }
        .p-title { font-size: 13px; font-weight: 700; color: var(--accent); margin-bottom: 10px; text-align: center; }
        .p-progress { width: 100%; height: 4px; background: #333; border-radius: 2px; margin-bottom: 15px; position: relative; }
        .p-bar { position: absolute; left: 0; top: 0; height: 100%; background: #fff; width: 0%; transition: 0.1s; }
        .p-btns { display: flex; justify-content: center; align-items: center; gap: 20px; }
        .p-btn { background: none; border: none; color: #fff; cursor: pointer; font-size: 20px; }

        /* 메인 콘텐츠 */
        .content { flex: 1; padding: 60px; overflow-y: auto; }
        .page { display: none; animation: fade 0.5s ease; }
        .page.active { display: block; }
        @keyframes fade { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 컴포넌트 */
        .apple-input { width: 100%; background: #1c1c1e; border: none; padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 10px; }
        .apple-btn { width: 100%; background: var(--accent); border: none; padding: 15px; border-radius: 12px; color: #fff; font-weight: 700; cursor: pointer; }
        .list-item { background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <h1 style="font-size: 24px; font-weight: 800; margin-bottom: 40px;">SUN-PHIL</h1>
        <nav>
            <div class="nav-item active" onclick="go('home', this)">대시보드</div>
            <div class="nav-item" onclick="go('music', this)">음악 관리</div>
            <div class="nav-item" onclick="go('archive', this)">장문 기록</div>
            <div class="nav-item" onclick="go('guest', this)">방명록</div>
        </nav>

        <div class="player-widget">
            <div class="p-title" id="now-playing">곡을 선택하세요</div>
            <div class="p-progress"><div class="p-bar" id="prog-bar"></div></div>
            <div class="p-btns">
                <button class="p-btn" onclick="prev()">⏮</button>
                <button class="p-btn" id="play-btn" onclick="toggle()">▶</button>
                <button class="p-btn" onclick="next()">⏭</button>
            </div>
        </div>
    </aside>

    <main class="content">
        <section id="pg-home" class="page active">
            <h1 style="font-size: 56px; font-weight: 800; letter-spacing: -2px; margin-bottom: 20px;">환영합니다.</h1>
            <p style="color: #86868b; font-size: 18px;">모든 데이터는 실시간으로 연동되며 저장됩니다.</p>
        </section>

        <section id="pg-music" class="page">
            <h2 style="margin-bottom: 30px;">음악 라이브러리</h2>
            <div style="background: var(--card); padding: 25px; border-radius: 20px; margin-bottom: 30px;">
                <input type="text" id="yt-link" class="apple-input" placeholder="유튜브 주소를 복사해 넣으세요">
                <button class="apple-btn" onclick="addSong()">라이브러리에 추가</button>
            </div>
            <div id="song-list"></div>
        </section>

        <section id="pg-archive" class="page">
            <h2 style="margin-bottom: 30px;">기록 보관소</h2>
            <textarea id="arc-text" class="apple-input" rows="15" placeholder="긴 설정을 입력하세요..."></textarea>
            <button class="apple-btn" onclick="saveArc()">설정 저장</button>
        </section>

        <section id="pg-guest" class="page">
            <h2 style="margin-bottom: 30px;">방명록</h2>
            <input type="text" id="gt-name" class="apple-input" placeholder="작성자">
            <textarea id="gt-msg" class="apple-input" rows="3" placeholder="메시지"></textarea>
            <button class="apple-btn" onclick="addGuest()">방명록 남기기</button>
            <div id="guest-list" style="margin-top: 30px;"></div>
        </section>
    </main>

    <div id="player-engine" style="display:none"></div>

    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        let player, playlist = JSON.parse(localStorage.getItem('sp_list')) || [], current = -1;

        // 유튜브 엔진 로드
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player-engine', {
                events: { 'onStateChange': (e) => {
                    if(e.data == 1) document.getElementById('play-btn').innerText = '⏸';
                    else document.getElementById('play-btn').innerText = '▶';
                    if(e.data == 0) next();
                }}
            });
        }

        // 음악 추가 및 재생 제어
        function addSong() {
            const val = document.getElementById('yt-link').value;
            if(!val) return;
            const vid = val.includes('v=') ? val.split('v=')[1].split('&')[0] : val.split('/').pop();
            playlist.push({ id: vid, title: "Track " + (playlist.length + 1) });
            localStorage.setItem('sp_list', JSON.stringify(playlist));
            renderList();
            document.getElementById('yt-link').value = '';
        }

        function renderList() {
            document.getElementById('song-list').innerHTML = playlist.map((s, i) => `
                <div class="list-item">
                    <span>${s.title}</span>
                    <button class="apple-btn" style="width:auto; padding:8px 15px;" onclick="play(${i})">재생</button>
                </div>
            `).join('');
        }

        function play(idx) {
            current = idx;
            document.getElementById('now-playing').innerText = playlist[current].title;
            player.loadVideoById(playlist[current].id);
            player.playVideo();
        }

        function toggle() {
            if(current == -1 && playlist.length > 0) return play(0);
            if(player.getPlayerState() == 1) player.pauseVideo();
            else player.playVideo();
        }

        function next() { if(current < playlist.length - 1) play(current + 1); }
        function prev() { if(current > 0) play(current - 1); }

        // 진행바 업데이트
        setInterval(() => {
            if(player && player.getCurrentTime) {
                const p = (player.getCurrentTime() / player.getDuration()) * 100;
                document.getElementById('prog-bar').style.width = (p || 0) + '%';
            }
        }, 500);

        // 페이지 이동
        function go(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById('pg-' + id).classList.add('active');
            el.classList.add('active');
        }

        // 방명록/기록 기능
        function addGuest() {
            const n = document.getElementById('gt-name').value, m = document.getElementById('gt-msg').value;
            if(!n || !m) return;
            let gl = JSON.parse(localStorage.getItem('sp_gt')) || [];
            gl.push({n, m});
            localStorage.setItem('sp_gt', JSON.stringify(gl));
            renderGuest();
        }

        function renderGuest() {
            const gl = JSON.parse(localStorage.getItem('sp_gt')) || [];
            document.getElementById('guest-list').innerHTML = gl.reverse().map(g => `
                <div class="list-item" style="flex-direction:column; align-items:start;">
                    <b style="color:var(--accent)">${g.n}</b><p style="font-size:14px; margin-top:5px;">${g.m}</p>
                </div>
            `).join('');
        }

        function saveArc() {
            localStorage.setItem('sp_arc', document.getElementById('arc-text').value);
            alert('기록이 저장되었습니다.');
        }

        window.onload = () => {
            renderList(); renderGuest();
            document.getElementById('arc-text').value = localStorage.getItem('sp_arc') || '';
        };
    </script>
</body>
</html>
